<!--
===================================================================================
CLAUDE DEVELOPER NOTES — Countries Visited App
Last updated: 2026-03-08
===================================================================================

OVERVIEW:
  Single-file HTML app. No build step, no server. Open directly in Chrome or iOS Safari.
  Leaflet.js for the map, CartoDB dark tiles (no API key needed).
  world-atlas@2 TopoJSON loaded from jsDelivr CDN at runtime.
  topojson-client@3 loaded from cdnjs CDN at runtime.

ARCHITECTURE:
  - Map init: Leaflet, worldCopyJump:true for infinite horizontal panning
  - GeoJSON: TopoJSON → GeoJSON via topojson.feature(), then fixAntimeridian()
  - Country names: static ISO 3166-1 numeric → name map in getCountryNames()
  - State: visited{} object: { countryName: { color, layer } }
  - Sidebar: alphabetically sorted list, click to fly-to, ✕ to remove
  - Counter: live count of selected countries in header

KEY FIXES ALREADY APPLIED:
  1. ANTIMERIDIAN: Russia, Fiji, Kiribati, Alaska all cross ±180° longitude.
     Fixed via fixAntimeridian() which unwraps polygon ring coordinates so
     consecutive points never jump more than 180°. Do not remove this.
  2. BLANK PAGE ON SAVE: The download <a> element must be appended to
     document.body before .click(), then removed + URL revoked after 200ms.
     Do not revert to the detached element pattern.
  3. BELIZE (and others): Was missing from name map and filtered out.
     The filter has been removed entirely — unknown IDs show as "Region <id>"
     instead of disappearing. Antarctica = ID 10.
  4. WORLD WRAP: worldCopyJump:true on map init + setMaxBounds(null) after
     GeoJSON layer loads. Tiles wrap natively; GeoJSON snaps back correctly.
  5. iOS SAFARI COMPATIBILITY (2026-03-08):
     a. Color picker: input[type=color] not supported on iOS. Replaced with
        6 preset color swatches (.color-swatch). Hidden <input id=colorPicker>
        kept for JS compatibility. initSwatches() wires up click handlers.
     b. Touch events: mouseover/mouseout don't fire on iOS. onEachFeature now
        checks window.matchMedia('(hover: none)') and skips hover effects on
        touch devices. Click shows a brief tooltip instead.
     c. File input: Dynamically created input.click() is blocked by iOS Safari.
        loadSession() now uses a persistent #_fileInput element in the DOM.
     d. Save/download: createObjectURL downloads are unreliable on iOS.
        saveSession() detects iOS via userAgent and uses FileReader+dataURL instead.
     e. Remove button: opacity:0 until hover is invisible on touch.
        @media (hover: none) sets opacity:0.6 always.
     f. Responsive layout: @media (max-width:600px) stacks sidebar below map
        and adjusts header for narrow screens.

CLICK BEHAVIOR:
  - Click/tap unvisited country → highlight with current color swatch color
  - Click/tap visited country → deselect (remove highlight)
  - Click country in sidebar → fly to it on map
  - ✕ in sidebar → remove country

SESSION PERSISTENCE:
  - localStorage: auto-saves on every Save click, auto-restores on page open
  - JSON file download: triggered on Save, loadable via Load button
  - Saved data format: { visited: { countryName: hexColor }, color: hex, savedAt: ISO }

COLOR SWATCHES:
  - 6 preset colors defined as .color-swatch divs in .color-picker-wrap
  - To add colors: add another <div class="color-swatch" style="background:#hex" data-color="#hex">
  - Active swatch gets white border + scale(1.2) transform
  - Hidden input[type=color] #colorPicker retains color state for JS

COUNTRY NAME MAP:
  - Located in getCountryNames() function
  - Keys are ISO 3166-1 numeric codes (integers)
  - Covers ~250 countries/territories
  - To add a missing country: find its ISO numeric code and add to the map
  - To rename a region: add its numeric ID with the desired name

FONTS: Playfair Display (headings), DM Sans (body) — loaded from Google Fonts
COLORS: CSS variables in :root — dark navy theme, gold accents (#c9a84c)

TILE LAYER: https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png
  - No API key required
  - dark_nolabels variant used (country labels handled via Leaflet tooltips)

IF THINGS BREAK:
  - CDN down? topojson and world-atlas are the two runtime dependencies.
    Fallback: bundle topojson inline or switch to a GeoJSON source.
  - Countries not clickable? Check that geoJsonLayer.onEachFeature fired.
  - Antimeridian lines reappear? fixAntimeridian() was removed or not called.
  - iOS save not downloading? iOS only allows downloads in response to direct user
    gesture. The FileReader/dataURL approach in saveSession() handles this.
===================================================================================
-->

<script>
document.addEventListener('DOMContentLoaded', function() {

// ─── STATE ───────────────────────────────────────────────────────────────────
const visited = {}; // { countryName: { color, layer } }
let geoJsonLayer = null;
let allFeatures = [];

// ─── MAP INIT ─────────────────────────────────────────────────────────────────
// Deferred until DOMContentLoaded so #map has a real pixel size before Leaflet measures it.
// On iOS WebKit, inline script execution can precede layout, giving Leaflet a 0×0 container.
const map = L.map('map', {
  center: [20, 0],
  zoom: 2,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: true,
  worldCopyJump: true,
});

// Natural Earth tile — open source, no API key
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap, © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ─── ANTIMERIDIAN FIX ────────────────────────────────────────────────────────
// Splits polygons that cross the antimeridian (±180°) so Leaflet renders them correctly.
// Affects Russia, Fiji, USA (Alaska), Kiribati, etc.
function fixAntimeridian(geojson) {
  geojson.features = geojson.features.map(feature => {
    if (!feature.geometry) return feature;
    const type = feature.geometry.type;
    if (type === 'Polygon') {
      feature.geometry.coordinates = feature.geometry.coordinates.map(ring => fixRing(ring));
    } else if (type === 'MultiPolygon') {
      feature.geometry.coordinates = feature.geometry.coordinates.map(poly =>
        poly.map(ring => fixRing(ring))
      );
    }
    return feature;
  });
  return geojson;
}

function fixRing(ring) {
  // Unwrap longitudes so that consecutive points never jump more than 180°
  const fixed = [ring[0].slice()];
  for (let i = 1; i < ring.length; i++) {
    const prev = fixed[i - 1];
    const curr = ring[i].slice();
    let lng = curr[0];
    const prevLng = prev[0];
    // Adjust longitude to be within 180° of the previous point
    while (lng - prevLng > 180) lng -= 360;
    while (prevLng - lng > 180) lng += 360;
    curr[0] = lng;
    fixed.push(curr);
  }
  return fixed;
}

async function init() {
  showToast('Loading map data…');
  try {
    // topojson loaded via <script> tag in <head> — no dynamic load needed

    // Use XMLHttpRequest instead of fetch() — more reliable on iOS when
    // opening as a local file:// URL, which can block fetch() to CDNs
    const topo = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch(e) { reject(new Error('JSON parse failed: ' + e.message)); }
        } else {
          reject(new Error('HTTP ' + xhr.status + ' loading map data'));
        }
      };
      xhr.onerror = () => reject(new Error('Network error loading map data — check connection'));
      xhr.ontimeout = () => reject(new Error('Timeout loading map data'));
      xhr.timeout = 15000;
      xhr.send();
    });

    // Convert to GeoJSON
    const geojson = topojson.feature(topo, topo.objects.countries);

    // Fix antimeridian artifacts (Russia, Fiji, etc.)
    fixAntimeridian(geojson);

    // Country names
    const nameMap = await getCountryNames();

    geojson.features.forEach(f => {
      f.properties = f.properties || {};
      const name = nameMap[parseInt(f.id)];
      f.properties.name = name || ('Region ' + f.id);
    });

    initLayers(geojson);
    hideToast();
  } catch(e) {
    console.error(e);
    // Show the actual error message so it's diagnosable
    const t = document.getElementById('toast');
    t.classList.add('error');
    showToast('Map error: ' + e.message);
  }
}

    10:"Antarctica",876:"Wallis and Futuna",732:"Western Sahara",887:"Yemen",
    894:"Zambia",716:"Zimbabwe",
  };
}

function initLayers(geojson) {
  allFeatures = geojson.features;

  geoJsonLayer = L.geoJSON(geojson, {
    style: defaultStyle,
    onEachFeature: onEachFeature,
  }).addTo(map);

  // Allow tile layer to repeat across longitude
  map.setMaxBounds(null);

  // Force Leaflet to remeasure container — critical on iOS where
  // the map div may have been 0px tall during initial render
  setTimeout(() => map.invalidateSize(), 100);

  // Restore saved session if exists
  const saved = localStorage.getItem('countries-visited-session');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.visited) {
        Object.entries(data.visited).forEach(([name, color]) => {
          const layer = findLayerByName(name);
          if (layer) highlightCountry(layer, name, color, false);
        });
        if (data.color) document.getElementById('colorPicker').value = data.color;
        showToast('Session restored ✓');
        setTimeout(hideToast, 2000);
      }
    } catch(e) {}
  }
}

function defaultStyle(feature) {
  const name = feature.properties.name;
  if (visited[name]) {
    return {
      fillColor: visited[name].color,
      fillOpacity: 0.65,
      color: '#ffffff',
      weight: 0.8,
      opacity: 0.7,
    };
  }
  return {
    fillColor: '#2a3550',
    fillOpacity: 0.7,
    color: '#3d4d6e',
    weight: 0.8,
    opacity: 0.8,
  };
}

function onEachFeature(feature, layer) {
  const name = feature.properties.name;
  const isTouch = () => window.matchMedia('(hover: none)').matches;

  layer.on({
    mouseover(e) {
      if (isTouch()) return; // skip hover effects on touch
      const l = e.target;
      if (!visited[name]) {
        l.setStyle({ fillColor: '#3d5a8a', fillOpacity: 0.8 });
      } else {
        l.setStyle({ fillOpacity: 0.85, weight: 2 });
      }
      l.bindTooltip(name, { sticky: true, className: '' }).openTooltip();
    },
    mouseout(e) {
      if (isTouch()) return;
      geoJsonLayer.resetStyle(e.target);
      e.target.closeTooltip();
    },
    click(e) {
      // Show tooltip on touch
      if (isTouch()) {
        const l = e.target;
        l.bindTooltip(name, { sticky: false, className: '' }).openTooltip();
        setTimeout(() => l.closeTooltip(), 1500);
      }
      if (visited[name]) {
        removeCountry(name);
      } else {
        const color = document.getElementById('colorPicker').value;
        highlightCountry(layer, name, color, true);
      }
    }
  });
}

function highlightCountry(layer, name, color, updateList) {
  visited[name] = { color, layer };
  layer.setStyle({
    fillColor: color,
    fillOpacity: 0.65,
    color: '#ffffff',
    weight: 1.2,
    opacity: 0.9,
  });
  if (updateList) renderList();
}

function removeCountry(name) {
  if (visited[name]) {
    const layer = visited[name].layer;
    delete visited[name];
    geoJsonLayer.resetStyle(layer);
    renderList();
  }
}

function findLayerByName(name) {
  let found = null;
  geoJsonLayer.eachLayer(l => {
    if (l.feature && l.feature.properties.name === name) found = l;
  });
  return found;
}

function renderList() {
  const list = document.getElementById('countryList');
  const names = Object.keys(visited).sort();
  document.getElementById('counter').textContent = names.length;

  if (names.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="icon">🌍</span>
      No countries selected yet.<br>Click any country on the map to get started.
    </div>`;
    return;
  }

  list.innerHTML = names.map(name => `
    <div class="country-item" onclick="flyToCountry('${name.replace(/'/g,"\\'")}')">
      <div class="country-swatch" style="background:${visited[name].color}"></div>
      <span class="country-name">${name}</span>
      <span class="country-remove" onclick="event.stopPropagation(); removeCountry('${name.replace(/'/g,"\\'")}')">✕</span>
    </div>
  `).join('');
}

function flyToCountry(name) {
  const layer = visited[name]?.layer;
  if (layer) {
    map.flyToBounds(layer.getBounds(), { duration: 0.8, padding: [40, 40] });
  }
}

function clearAll() {
  if (Object.keys(visited).length === 0) return;
  if (!confirm('Clear all highlighted countries?')) return;
  const names = Object.keys(visited);
  names.forEach(name => {
    const layer = visited[name].layer;
    delete visited[name];
    if (geoJsonLayer) geoJsonLayer.resetStyle(layer);
  });
  renderList();
}

function saveSession() {
  const data = {
    visited: {},
    color: document.getElementById('colorPicker').value,
    savedAt: new Date().toISOString(),
  };
  Object.entries(visited).forEach(([name, v]) => {
    data.visited[name] = v.color;
  });
  localStorage.setItem('countries-visited-session', JSON.stringify(data));

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });

  // iOS Safari: use FileReader to convert to data URL since createObjectURL download is unreliable
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    const reader = new FileReader();
    reader.onload = function() {
      const a = document.createElement('a');
      a.href = reader.result;
      a.download = 'countries-visited.json';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 300);
    };
    reader.readAsDataURL(blob);
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'countries-visited.json';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 200);
  }

  showToast('Session saved ✓');
  setTimeout(hideToast, 2000);
}

function loadSession() {
  // Must use a persistent input element for iOS compatibility
  let input = document.getElementById('_fileInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.id = '_fileInput';
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  // Reset so same file can be reloaded
  input.value = '';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.visited) throw new Error('Invalid file');

        Object.entries(visited).forEach(([name, v]) => {
          if (geoJsonLayer) geoJsonLayer.resetStyle(v.layer);
        });
        Object.keys(visited).forEach(k => delete visited[k]);

        Object.entries(data.visited).forEach(([name, color]) => {
          const layer = findLayerByName(name);
          if (layer) highlightCountry(layer, name, color, false);
        });
        if (data.color) {
          document.getElementById('colorPicker').value = data.color;
          setActiveSwatchColor(data.color);
        }
        renderList();
        showToast('Session loaded ✓');
        setTimeout(hideToast, 2000);
      } catch(e) {
        showToast('Invalid session file.');
        setTimeout(hideToast, 2000);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── COLOR SWATCHES ───────────────────────────────────────────────────────────
function initSwatches() {
  const swatches = document.querySelectorAll('.color-swatch');
  swatches.forEach(swatch => {
    swatch.addEventListener('click', () => {
      swatches.forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      document.getElementById('colorPicker').value = swatch.dataset.color;
    });
  });
}

function setActiveSwatchColor(hex) {
  const swatches = document.querySelectorAll('.color-swatch');
  let matched = false;
  swatches.forEach(s => {
    s.classList.remove('active');
    if (s.dataset.color.toLowerCase() === hex.toLowerCase()) {
      s.classList.add('active');
      matched = true;
    }
  });
  // If no swatch matches, just leave none active
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
}
function hideToast() {
  document.getElementById('toast').style.opacity = '0';
}

// ─── START ────────────────────────────────────────────────────────────────────
// Expose functions used by inline onclick attributes to global scope
window.clearAll = clearAll;
window.loadSession = loadSession;
window.saveSession = saveSession;
window.flyToCountry = flyToCountry;
window.removeCountry = removeCountry;

initSwatches();
init();

// Hide initial toast after 3s
setTimeout(hideToast, 3000);

}); // end DOMContentLoaded
</script>
</body>
</html>
